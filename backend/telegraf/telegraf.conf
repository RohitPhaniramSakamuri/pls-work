# Telegraf Configuration — ESP32 Honeypot Pipeline

[global_tags]
  pipeline = "honeypot"

[agent]
  interval = "3s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "3s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

# ─── INPUT: MQTT Consumer (JSON events from ESP32) ────────────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "honeypot/events/#"
  ]
  qos = 0
  connection_timeout = "30s"
  client_id = "telegraf-honeypot"
  data_format = "json"
  json_string_fields = ["proto", "src_ip", "user", "pass", "cmd", "evt", "node", "ts",
                        "pattern_name", "pattern_group", "session_id",
                        "botnet_family", "mitre"]
  name_override = "mqtt_consumer"
  tag_keys = ["proto", "evt", "node", "pattern_group"]

# ─── PROCESSOR: Type conversions for numeric fields ────────────────────────
[[processors.converter]]
  namepass = ["mqtt_consumer"]
  [processors.converter.fields]
    float = ["pattern_id", "confidence", "attempt_num", "session_dur_ms"]

# ─── AGGREGATOR: Attack rate (events/min) over 5-min sliding windows ───────────
[[aggregators.basicstats]]
  namepass = ["mqtt_consumer"]
  period = "5m"
  drop_original = false
  stats = ["count", "mean"]
  name_override = "attack_rate_5m"

# ─── OUTPUT: InfluxDB v2 ────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUX_TOKEN"
  organization = "$INFLUX_ORG"
  bucket = "$INFLUX_BUCKET"
  timeout = "5s"
