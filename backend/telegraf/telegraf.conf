# Telegraf Configuration — ESP32 Honeypot Pipeline

[global_tags]
  pipeline = "honeypot"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

# ─── INPUT: MQTT Consumer ────────────────────────────────────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "honeypot/events/#"
  ]
  qos = 0
  connection_timeout = "30s"
  client_id = "telegraf-honeypot"
  data_format = "json"
  # ts is millis-since-boot on ESP32, not Unix epoch — use Telegraf ingestion time
  json_string_fields = ["proto", "src_ip", "user", "pass", "cmd", "evt", "node", "ts"]
  name_override = "honeypot_events"
  tag_keys = ["proto", "evt", "node"]

# ─── OUTPUT: InfluxDB v2 ─────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUX_TOKEN"
  organization = "$INFLUX_ORG"
  bucket = "$INFLUX_BUCKET"
  timeout = "5s"

# ─── OUTPUT: Debug to stdout (comment out in production) ─────────────────────
